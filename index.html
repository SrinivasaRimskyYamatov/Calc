<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大和夫の電卓</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>大和夫の電卓</h1>

    <p class="description">
        シンプルで軽量なAndroid向け電卓アプリです。
    </p>

    <img
        src="preview.png"
        alt="大和夫の電卓 スクリーンショット"
        class="preview">

    <a href="calc.apk" class="download-btn">
        APKをダウンロード
    </a>

    <div class="features">
        <h2>機能</h2>

        <ul>
            <li>四則演算 (+ - * /)</li>
            <li>小数計算対応</li>
            <li>シンプルなUI</li>
            <li>オフライン動作</li>
        </ul>
    </div>

    <p class="note">
        インストール時は「提供元不明のアプリ」を許可してください。
    </p>

</div>

</body>
</html>
